<!DOCTYPE html>
<html>
<head>
    <title>Аналітика Відкритих Даних - v2.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Анімація для вузла */
        .pulse-node {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(13, 110, 253, 0.4); }
            100% { box-shadow: 0 0 0 15px rgba(13, 110, 253, 0); }
        }

        /* Стиль для карток у темній темі */
        .card { background-color: #2c3034; color: white; border: 1px solid #454d55; }
        .table { color: white; }
    </style>
</head>
<body class="bg-dark text-white"> <!-- Змінили фон на темний -->
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>📊 Аналіз Даних <span class="badge bg-warning text-dark" style="font-size: 0.5em;">v2.0-PRO</span></h1>
        </div>

        <div class="alert alert-primary py-3 pulse-node"> <!-- Додали пульсацію -->
            <strong>🚀 Активний вузол:</strong>
            <span class="badge bg-white text-primary fs-5">{{ hostname }}</span>
        </div>

        <section class="mb-5 p-4 bg-secondary rounded shadow-sm">
            <h3>📝 Опис системи (Оновлено)</h3>
            <p>Ця версія розгорнута автоматично через <strong>Argo CD GitOps</strong>. Кожна репліка балансує запити в реальному часі.</p>
        </section>

        <section class="mb-5">
            <h3>📥 Дані з MySQL</h3>
            <div class="table-responsive p-3 rounded shadow-sm" style="background: #212529;">
                {{ raw_data | safe }}
            </div>
        </section>

        <section>
            <h3>📈 Візуалізація</h3>
            <div class="row mt-3">
                {% for plot in plots %}
                <div class="col-md-6 mb-4">
                    <div class="card shadow-sm">
                        <img src="/plots/{{ plot }}" class="card-img-top" alt="Plot" style="filter: brightness(0.8);">
                        <div class="card-body text-center font-monospace small text-info">{{ plot }}</div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </section>
    </div>
</body>
</html>
