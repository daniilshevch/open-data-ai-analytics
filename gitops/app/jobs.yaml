# WAVE 1: Завантаження даних
apiVersion: batch/v1
kind: Job
metadata:
  name: data-load
  namespace: analytics-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
      - name: loader
        image: daniilshevch/app-data_load:latest
        imagePullPolicy: Always  # Додано
        env:
        - name: MYSQL_HOST
          value: "mysql-service"
        - name: MYSQL_DATABASE
          value: "analytics_db"
        - name: MYSQL_USER
          value: "user"
        - name: MYSQL_PASSWORD
          value: "password"
      restartPolicy: OnFailure
---
# WAVE 2: Якість даних
apiVersion: batch/v1
