# WAVE 3: Візуалізація
apiVersion: batch/v1
kind: Job
metadata:
  name: visualization
  namespace: analytics-app
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
      - name: visual
        image: daniilshevch/app-visualization:latest
        imagePullPolicy: Always  # Додано
        env:
        - name: MYSQL_HOST
          value: "mysql-service"
        - name: MYSQL_DATABASE
          value: "analytics_db"
        - name: MYSQL_USER
          value: "user"
        - name: MYSQL_PASSWORD
          value: "password"
        volumeMounts:
        - name: reports
          mountPath: /app/reports
      volumes:
      - name: reports
        persistentVolumeClaim:
          claimName: reports-pvc
      restartPolicy: OnFailure