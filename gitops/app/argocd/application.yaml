apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analytics-system
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/daniilshevch/open-data-ai-analytics
    targetRevision: HEAD
    path: gitops/app
  destination:
    server: https://kubernetes.default.svc
    namespace: analytics-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true